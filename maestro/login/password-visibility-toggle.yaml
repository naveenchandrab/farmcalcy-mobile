# E2E: the password reveal toggle shows and re-hides the entered password.
appId: com.farmcalcy.pcfms
name: Login - Password Visibility Toggle
tags:
  - auth
  - login
---
- runFlow: ../shared/launch-fresh.yaml
- tapOn:
    id: "login-password-input"
- inputText: ${PASSWORD}
# No `hideKeyboard` (unreliable BACK gesture on Android). The reveal toggle sits
# inside the password field, above the keyboard, so it is tappable directly.
- tapOn:
    id: "login-password-toggle"
- assertVisible:
    text: ${PASSWORD}
# Hide again — the plain text is masked.
- tapOn:
    id: "login-password-toggle"
- assertNotVisible:
    text: ${PASSWORD}
