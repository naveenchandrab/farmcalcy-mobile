# E2E: the full happy-path reset journey — request OTP, enter the valid code,
# set a new password, see the success screen and return to Login.
#
# Prereq: OTP must be the real code issued to EMAIL. In CI this typically comes
# from a test-only mail capture / a deterministic OTP in the staging backend:
#   maestro test -e OTP=<captured-code> maestro/forgot-password/reset-password-success.yaml
appId: com.farmseasy.pcfms
name: Forgot Password - Reset Success
tags:
  - auth
  - forgot-password
  - smoke
---
- runFlow: request-otp.yaml
- tapOn:
    id: "otp-input-0"
- inputText: ${OTP}
# A complete, valid code auto-advances to the reset screen; wait out the
# transition animation rather than asserting once.
- extendedWaitUntil:
    visible:
      id: "reset-password-screen"
    timeout: 10000
- tapOn:
    id: "reset-password-new-input"
- inputText: ${NEW_PASSWORD}
- tapOn:
    id: "reset-password-confirm-input"
- inputText: ${NEW_PASSWORD}
# AuthScreenLayout keeps the submit button scrolled above the keyboard, so it
# can be tapped directly without dismissing the IME.
- tapOn:
    id: "reset-password-button"
# Terminal success state.
- extendedWaitUntil:
    visible:
      id: "reset-password-success"
    timeout: 10000
- tapOn:
    id: "reset-password-success-cta"
- assertVisible:
    id: "login-screen"
