# E2E: logging out clears the session and returns the user to Login.
#
# Logout lives in the hamburger drawer (not the home screen). We open the drawer
# via "open-menu-button" (TEST_IDS.session.openMenuButton) then tap
# "logout-button" (TEST_IDS.session.logoutButton).
appId: com.farmseasy.pcfms
name: Session - Logout
tags:
  - auth
  - session
---
- runFlow: ../shared/launch-fresh.yaml
- runFlow: ../shared/login.yaml
- extendedWaitUntil:
    notVisible:
      id: "login-screen"
    timeout: 10000
# Open the hamburger drawer, then log out from it.
- tapOn:
    id: "open-menu-button"
- tapOn:
    id: "logout-button"
# Back to the auth stack.
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 10000
# A restart must NOT restore the cleared session.
- launchApp:
    clearState: false
    stopApp: true
- assertVisible:
    id: "login-screen"
