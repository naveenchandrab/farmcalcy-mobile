# E2E: a complete company registration (company details + structured address +
# owner as-per-Aadhaar) creates a PENDING request and lands on the "submitted"
# screen. Uses a timestamp so the email/phone are unique on every run.
appId: com.farmseasy.pcfms
name: Registration - Company Happy Path
tags:
  - auth
  - registration
---
- runFlow: ../shared/open-register.yaml
- evalScript: ${output.ts = Date.now(); output.companyEmail = 'e2e-co-' + output.ts + '@example.com'; output.ownerEmail = 'e2e-owner-' + output.ts + '@example.com'; output.phone = '+91' + (9000000000 + (output.ts % 1000000000))}

- tapOn:
    id: "register-option-tenant"
- assertVisible:
    text: "Register a Company"

# ── Company details ──
- tapOn:
    id: "registration-field-companyName"
- inputText: "E2E Poultry ${output.ts}"
- tapOn:
    id: "registration-field-companyEmail"
- inputText: ${output.companyEmail}
- tapOn:
    id: "registration-field-companyPhone"
- inputText: "+919812300000"

# ── Structured address ──
- scrollUntilVisible:
    element:
      id: "registration-field-addressLine1"
    direction: DOWN
- tapOn:
    id: "registration-field-addressLine1"
- inputText: "12 Industrial Estate"
- scrollUntilVisible:
    element:
      id: "registration-field-district"
    direction: DOWN
- tapOn:
    id: "registration-field-district"
- inputText: "Coimbatore"
- scrollUntilVisible:
    element:
      id: "registration-select-state"
    direction: DOWN
- tapOn:
    id: "registration-select-state"
- tapOn:
    text: "Karnataka"
- scrollUntilVisible:
    element:
      id: "registration-field-pincode"
    direction: DOWN
- tapOn:
    id: "registration-field-pincode"
- inputText: "641001"

# ── Owner / Founder (as per Aadhaar) ──
- scrollUntilVisible:
    element:
      id: "registration-field-firstName"
    direction: DOWN
- tapOn:
    id: "registration-field-firstName"
- inputText: "Rajesh"
- tapOn:
    id: "registration-field-lastName"
- inputText: "Kumar"
- scrollUntilVisible:
    element:
      id: "registration-field-adminEmail"
    direction: DOWN
- tapOn:
    id: "registration-field-adminEmail"
- inputText: ${output.ownerEmail}
- tapOn:
    id: "registration-field-phoneNumber"
- inputText: ${output.phone}

# ── Submit → pending screen ──
- scrollUntilVisible:
    element:
      id: "registration-submit"
    direction: DOWN
- tapOn:
    id: "registration-submit"
- extendedWaitUntil:
    visible:
      text: "Registration Submitted"
    timeout: 15000
- assertVisible:
    text: "Back to Login"
