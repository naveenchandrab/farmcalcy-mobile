apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// ─── Signing properties ───────────────────────────────────────────────────────
// Loaded from android/keystore/keystore.properties (not committed to git).
// Falls back gracefully so debug builds work without the file.
def keystorePropertiesFile = rootProject.file("keystore/keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

/**
 * React Native configuration block.
 * react-native.config.js governs JS bundling; this block governs native build.
 */
react {
    /* Hermes JS engine — must stay true to match hermesEnabled in gradle.properties */
    hermesEnabled = true
    /* Wire up native module autolinking — adds implementation project(':module') for each native lib */
    autolinkLibrariesWithApp()
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.farmcalcy.pcfms"

    defaultConfig {
        applicationId "com.farmcalcy.pcfms"
        minSdkVersion rootProject.ext.minSdkVersion      // 24 (Android 7.0)
        targetSdkVersion rootProject.ext.targetSdkVersion // 35
        versionCode 1
        versionName "1.0.0"

        // Restrict APK architectures per gradle.properties
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }

    // ─── Signing Configs ──────────────────────────────────────────────────────
    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties["MYAPP_RELEASE_STORE_FILE"])
                storePassword keystoreProperties["MYAPP_RELEASE_STORE_PASSWORD"]
                keyAlias keystoreProperties["MYAPP_RELEASE_KEY_ALIAS"]
                keyPassword keystoreProperties["MYAPP_RELEASE_KEY_PASSWORD"]
            } else {
                // CI/CD: read from environment variables instead of the file.
                // Set MYAPP_RELEASE_STORE_FILE, MYAPP_RELEASE_STORE_PASSWORD,
                // MYAPP_RELEASE_KEY_ALIAS, MYAPP_RELEASE_KEY_PASSWORD in the pipeline.
                storeFile System.getenv("MYAPP_RELEASE_STORE_FILE") ?
                    file(System.getenv("MYAPP_RELEASE_STORE_FILE")) : null
                storePassword System.getenv("MYAPP_RELEASE_STORE_PASSWORD")
                keyAlias System.getenv("MYAPP_RELEASE_KEY_ALIAS")
                keyPassword System.getenv("MYAPP_RELEASE_KEY_PASSWORD")
            }
        }
    }

    // ─── Build Types ──────────────────────────────────────────────────────────
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            // Allow cleartext traffic for Metro bundler on debug builds
            manifestPlaceholders = [usesCleartextTraffic: "true"]
        }
        release {
            // R8 full-mode shrinking + obfuscation
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.release
            manifestPlaceholders = [usesCleartextTraffic: "false"]
        }
    }

    // ─── Compile options ──────────────────────────────────────────────────────
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    // React Native core
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
}

apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle")
apply from: project(':react-native-config').projectDir.path + "/dotenv.gradle"
